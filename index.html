<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINOND | Estudio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

  
    <div class="notebook-container">
        <main class="sketch-view home-page" id="scrapbook-canvas">
            <img
                src="img/00_generales/01_logo/logo_MINOND-estudio-2021.jpg"
                alt="Logo Minond"
                class="logo-zona-roja"
            >

            <div class="scrapbook-item item-1">
                <img src="img/00_generales/02_imágenes home/CM-026.09.jpg" alt="Obra 1">
            </div>
            <div class="scrapbook-item item-2">
                <img src="img/00_generales/02_imágenes home/CM-027.14-01.jpg" alt="Obra 2">
            </div>
            <div class="scrapbook-item item-3">
                <img src="img/00_generales/02_imágenes home/CM-027.31.png" alt="Obra 3">
            </div>
            <div class="scrapbook-item item-4">
                <img src="img/00_generales/02_imágenes home/CM-027.19.png" alt="Obra 4">
            </div>

        </main>

      
        <div class="elastic-band"></div>

        <aside class="sidebar">
            <div class="logo-box">
                <!-- Logo vacío en home — aparece flotante en la hoja -->
            </div>

            <nav class="navigation">
              
                <ul class="main-links">
                    <li class="active-item">
                        <a href="proyectos.html">proyectos</a>
                    </li>
                </ul>

                <div class="menu-spacer"></div>

                <ul class="secundary-links">
                    <li><a href="html/Equipo.html">equipo</a></li>
                    <li><a href="html/coleccion.html">colección de croquis</a></li>
                    <li><a href="html/publicaciones.html">publicaciones</a></li>
                    <li><a href="html/contacto.html">contacto</a></li>
                </ul>
            </nav>
        </aside>

    </div>

    <script>


        const items = document.querySelectorAll('.scrapbook-item');

        items.forEach(item => {
            item.addEventListener('mousedown', startDragging);
        });

        function startDragging(e) {
            const item = e.currentTarget;

            let shiftX = e.clientX - item.getBoundingClientRect().left;
            let shiftY = e.clientY - item.getBoundingClientRect().top;

            function moveAt(pageX, pageY) {
                item.style.left = (pageX - shiftX) + 'px';
                item.style.top  = (pageY - shiftY) + 'px';
            }

            function onMouseMove(e) {
                moveAt(e.pageX, e.pageY);
            }

            document.addEventListener('mousemove', onMouseMove);

            
            function onMouseUp() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }
            document.addEventListener('mouseup', onMouseUp);

          
            item.ondragstart = () => false;
        }
    </script>

</body>
</html>
